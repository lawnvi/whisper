name: ci-checks

on:
  push:
    branches:
      - main
    tags-ignore:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-checks-${{ github.event.pull_request.head.sha || github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Flutter analyze + test
    runs-on: ubuntu-22.04
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Run flutter analyze
        run: flutter analyze

      - name: Run flutter test
        run: flutter test
